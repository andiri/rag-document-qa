name: 오늘의 한경 브리핑

on:
  schedule:
    # 07:00 KST = 22:00 UTC(전날). cron 은 UTC 기준.
    # 일요일은 한경 지면이 없어 제외 → UTC 일~금(0-5) = KST 월~토 발송(토요일 포함, 일요일 제외).
    - cron: "0 22 * * 0-5"
  workflow_dispatch: # 수동 실행 버튼
    inputs:
      mode:
        description: "소스 선택 (auto=변수따름 / email=지면PDF강제 / rss=RSS강제)"
        default: auto
        type: choice
        options: [auto, email, rss]

permissions:
  contents: write # 생성된 브리핑 JSON 을 repo 에 커밋

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate brief + send email
        timeout-minutes: 8
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # 경로 C1 자동화(선택): Variables 에 PDF_FROM_EMAIL=1 설정 시 지면 PDF 우선 요약
          PDF_FROM_EMAIL: ${{ vars.PDF_FROM_EMAIL }}
          PDF_EMAIL_FROM: ${{ vars.PDF_EMAIL_FROM }}
          PDF_EMAIL_SUBJECT: ${{ vars.PDF_EMAIL_SUBJECT }}
        run: |
          ARGS=""
          case "${{ github.event.inputs.mode }}" in
            email) ARGS="--from-email" ;;
            rss)   ARGS="--rss" ;;
          esac
          node scripts/daily-brief/run.js $ARGS

      - name: Commit brief to repo (for web view)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/briefs/
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 오늘의 한경 브리핑 업데이트 ($(TZ=Asia/Seoul date +%F))"
            git push
          fi
