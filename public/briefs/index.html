<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오늘의 한경 브리핑</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: #f4f5f7; color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
      }
      .wrap { max-width: 660px; margin: 0 auto; padding: 24px 18px 64px; }
      .card { background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
      .date { font-size: 13px; color: #888; }
      h1 { font-size: 22px; margin: 6px 0 4px; }
      .headline { font-size: 17px; font-weight: 600; margin: 8px 0 0; }
      h2 { font-size: 15px; color: #0b9d58; border-left: 4px solid #0b9d58; padding-left: 8px; margin: 22px 0 8px; }
      ul { margin: 0; padding-left: 20px; }
      li { margin: 7px 0; line-height: 1.5; }
      .insight { color: #666; }
      .tldr li { margin: 5px 0; }
      .foot { margin-top: 26px; font-size: 12px; color: #aaa; }
      .archive { margin-top: 18px; font-size: 13px; }
      .archive a { color: #0b7; text-decoration: none; margin-right: 10px; }
      .err { color: #c00; }
      @media (prefers-color-scheme: dark) {
        body { background: #16181d; color: #e8e8e8; }
        .card { background: #20242c; box-shadow: none; }
        .insight { color: #9aa4b2; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" id="app"><p>불러오는 중…</p></div>
      <div class="archive" id="archive"></div>
    </div>
    <script>
      const esc = (s) => String(s ?? '').replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const dateLabel = (iso) =>
        new Intl.DateTimeFormat('ko-KR', {
          timeZone: 'Asia/Seoul', year: 'numeric', month: 'long', day: 'numeric', weekday: 'short',
        }).format(new Date(iso));

      function render(b) {
        const tldr = (b.tldr || []).map((t) => `<li>${esc(t)}</li>`).join('');
        const sections = (b.sections || []).map((s) => {
          const items = (s.items || []).map(
            (it) => `<li><b>${esc(it.title)}</b>${it.insight ? ` <span class="insight">— ${esc(it.insight)}</span>` : ''}</li>`
          ).join('');
          const summary = s.summary ? `<p class="insight" style="margin:4px 0 6px;">${esc(s.summary)}</p>` : '';
          return `<h2>${esc(s.category)}</h2>${summary}<ul>${items}</ul>`;
        }).join('');
        return `
          <div class="date">${esc(dateLabel(b.meta?.generatedAt || Date.now()))}</div>
          <h1>📰 오늘의 한경 브리핑</h1>
          ${b.headline ? `<p class="headline">${esc(b.headline)}</p>` : ''}
          ${tldr ? `<h2>한눈에</h2><ul class="tldr">${tldr}</ul>` : ''}
          ${sections}
          <p class="foot">자동 요약 · ${esc(b.meta?.source || 'rss')} · ${esc(b.meta?.model || '')}</p>`;
      }

      async function load() {
        const app = document.getElementById('app');
        try {
          const res = await fetch('./latest.json?t=' + Date.now());
          if (!res.ok) throw new Error('아직 생성된 브리핑이 없습니다.');
          app.innerHTML = render(await res.json());
        } catch (e) {
          app.innerHTML = `<p class="err">${esc(e.message)}</p>`;
        }
        try {
          const idx = await (await fetch('./index.json?t=' + Date.now())).json();
          document.getElementById('archive').innerHTML =
            '지난 브리핑: ' + idx.slice(0, 14).map((e) => `<a href="./${e.date}.json">${e.date}</a>`).join('');
        } catch { /* 아카이브 없음 */ }
      }
      load();
    </script>
  </body>
</html>
